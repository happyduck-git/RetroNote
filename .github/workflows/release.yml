name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject chat config (Supabase)
        shell: bash
        run: |
          cat > src/config.local.js <<'EOF'
          export const SUPABASE = {
            url: "${{ secrets.SUPABASE_URL }}",
            anonKey: "${{ secrets.SUPABASE_ANON_KEY }}",
          };
          EOF

      # 서명 실패 원인 진단용(임시). keychain 에 실제로 어떤 코드사인 식별자가
      # import 되었는지, APPLE_SIGNING_IDENTITY 문자열과 일치하는지 확인한다.
      # 원인 파악 후 이 스텝은 제거해도 된다.
      - name: Debug signing identities (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "=== Available codesigning identities in keychain ==="
          # 여기 목록에 'Developer ID Application: ... (TEAMID)' 이 보여야 한다.
          # 보이지 않으면 => 인증서 import 실패(원인 3: 비밀번호/base64).
          security find-identity -v -p codesigning || true
          # 식별자 길이만 출력(값 자체는 GitHub 가 *** 로 마스킹). 위 목록의
          # 식별자 문자열 길이와 다르면 => 오타/따옴표/공백(원인 2).
          echo "=== APPLE_SIGNING_IDENTITY length: ${#APPLE_SIGNING_IDENTITY} ==="

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS 코드 서명 + 공증(notarization) ---
          # macOS 러너에서만 의미가 있다. Secret 이 비어 있으면 tauri-action 이
          # 서명/공증을 자동으로 건너뛰므로(=기존 unsigned 동작) 안전하다.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "retro-note __VERSION__"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Windows 무설치(포터블) 실행 파일: cargo 가 만든 원본 exe 를 그대로 릴리스에 첨부.
      # 인스톨러(NSIS/MSI)와 달리 설치 과정 없이 더블클릭으로 실행된다.
      # 주의: 서명이 없으므로 SmartScreen 경고는 인스톨러와 동일하게 뜬다(설치 단계만 생략).
      - name: Attach Windows portable exe
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "src-tauri/target/release/retro-note.exe" "retro-note_portable.exe"
          gh release upload "${{ github.ref_name }}" "retro-note_portable.exe" \
            --clobber --repo "${{ github.repository }}"

  cleanup:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove macOS updater artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in retro-note_aarch64.app.tar.gz retro-note_x64.app.tar.gz; do
            gh release delete-asset "${{ github.ref_name }}" "$asset" \
              --yes --repo "${{ github.repository }}" || true
          done
