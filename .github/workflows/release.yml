name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject chat config (Supabase)
        shell: bash
        run: |
          cat > src/config.local.js <<'EOF'
          export const SUPABASE = {
            url: "${{ secrets.SUPABASE_URL }}",
            anonKey: "${{ secrets.SUPABASE_ANON_KEY }}",
          };
          EOF

      # macOS 코드서명 인증서를 keychain 에 직접 import 한다.
      # 비밀번호/p12/base64 가 잘못되면 바로 이 스텝에서 명확한 에러
      # (예: "MAC verification failed ... wrong password?")로 멈추므로
      # tauri-action 의 모호한 'failed to resolve signing identity' 대신
      # 원인을 정확히 알 수 있다.
      - name: Import Apple Developer ID certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # import 결과 검증: 아래 목록에 'Developer ID Application: 이름 (TEAMID)'
      # 이 보여야 한다. 그 문자열이 APPLE_SIGNING_IDENTITY 와 정확히 일치해야
      # tauri 가 서명에 성공한다(length 로 공백/따옴표 혼입 점검).
      - name: Verify signing identity (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "=== Codesigning identities after import ==="
          security find-identity -v -p codesigning
          echo "=== APPLE_SIGNING_IDENTITY length: ${#APPLE_SIGNING_IDENTITY} ==="

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS 코드 서명 + 공증(notarization) ---
          # 인증서는 위 import 스텝에서 이미 keychain 에 넣었으므로 여기서는
          # APPLE_CERTIFICATE 를 넘기지 않는다(이중 import/모호성 방지).
          # tauri 는 APPLE_SIGNING_IDENTITY 로 keychain 의 식별자를 찾아 서명한다.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "retro-note __VERSION__"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Windows 무설치(포터블) 실행 파일: cargo 가 만든 원본 exe 를 그대로 릴리스에 첨부.
      # 인스톨러(NSIS/MSI)와 달리 설치 과정 없이 더블클릭으로 실행된다.
      # 주의: 서명이 없으므로 SmartScreen 경고는 인스톨러와 동일하게 뜬다(설치 단계만 생략).
      - name: Attach Windows portable exe
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "src-tauri/target/release/retro-note.exe" "retro-note_portable.exe"
          gh release upload "${{ github.ref_name }}" "retro-note_portable.exe" \
            --clobber --repo "${{ github.repository }}"

  cleanup:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove macOS updater artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in retro-note_aarch64.app.tar.gz retro-note_x64.app.tar.gz; do
            gh release delete-asset "${{ github.ref_name }}" "$asset" \
              --yes --repo "${{ github.repository }}" || true
          done
