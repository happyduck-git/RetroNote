name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject chat config (Supabase)
        shell: bash
        run: |
          cat > src/config.local.js <<'EOF'
          export const SUPABASE = {
            url: "${{ secrets.SUPABASE_URL }}",
            anonKey: "${{ secrets.SUPABASE_ANON_KEY }}",
          };
          EOF

      # 릴리스 노트 자동 생성: 병합된 PR 제목 기반 changelog.
      # tauri-action 이 이 본문을 릴리스 본문 + latest.json 의 notes 에 넣어,
      # 앱 업데이트 다이얼로그(update.body)에 "변경 내용"으로 표시된다.
      # 매트릭스 3개 잡이 각각 생성하지만 같은 태그라 결과는 동일하다. 실패 시 기본 문구로 폴백.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh api --method POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' 2>/dev/null || true)
          if [ -z "$body" ]; then
            body="See the assets below to download and install."
          fi
          {
            echo "body<<RN_EOF"
            echo "$body"
            echo "RN_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS 코드 서명 + 공증(notarization) ---
          # macOS 러너에서만 의미가 있다. Secret 이 비어 있으면 tauri-action 이
          # 서명/공증을 자동으로 건너뛰므로(=기존 unsigned 동작) 안전하다.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- 업데이터 산출물 서명 (tauri-plugin-updater) ---
          # APPLE_* 코드서명과 별개 체계. 이 키로 .app.tar.gz / 인스톨러에 .sig 를 만들고
          # 앱은 tauri.conf.json 의 pubkey 로 검증한다. Secret 미설정 시 서명 단계가 실패하므로
          # 업데이터를 켠 이상 두 secret 은 필수.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "retro-note __VERSION__"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # latest.json 생성·업로드(업데이터 엔드포인트). 기본값 true 지만 의도를 명시.
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

      # Windows 무설치(포터블) 실행 파일: cargo 가 만든 원본 exe 를 그대로 릴리스에 첨부.
      # 인스톨러(NSIS/MSI)와 달리 설치 과정 없이 더블클릭으로 실행된다.
      # 주의: 서명이 없으므로 SmartScreen 경고는 인스톨러와 동일하게 뜬다(설치 단계만 생략).
      - name: Attach Windows portable exe
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "src-tauri/target/release/retro-note.exe" "retro-note_portable.exe"
          gh release upload "${{ github.ref_name }}" "retro-note_portable.exe" \
            --clobber --repo "${{ github.repository }}"

  # NOTE: 과거의 'cleanup' 잡(.app.tar.gz 삭제)은 제거했다. 그 파일이 바로 업데이터가
  # 내려받는 산출물이라, 삭제하면 자동 업데이트가 동작하지 않는다.
