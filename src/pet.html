<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pet</title>
    <style>
      /* 펫 창은 스프라이트 외엔 전부 투명. 창 전체가 드래그/우클릭 대상. */
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      body {
        cursor: default;
        user-select: none;
        -webkit-user-select: none;
      }
      .pet-stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      /* 스프라이트: 창 아래("바닥")에 붙어 좌우로 이동. 창 리사이즈에 맞춰 크기도 스케일. */
      .pet {
        position: absolute;
        left: 0;
        bottom: 0;
        height: 74%;
        aspect-ratio: 1 / 1;
        background-repeat: no-repeat;
        background-position: left center;
        image-rendering: pixelated;
        transform-origin: center bottom;
        will-change: transform;
      }
      /* 안 읽음 빨간 점 — 펫 위에 얹힘(원이 아닌 픽셀 사각 블록, badge.js 와 같은 빨강). */
      .pet-dot {
        position: absolute;
        top: 4%;
        left: 44%;
        width: 13%;
        aspect-ratio: 1 / 1;
        background: #e23b3b;
        image-rendering: pixelated;
      }
      .pet-dot[hidden] {
        display: none;
      }
      /* 우클릭 메뉴 — 레트로 CRT 톤(어두운 배경 + 초록 테두리/글자). 창 밖으로 넘치지 않게
         JS 가 left/top 을 clamp 한다. */
      .pet-menu {
        position: absolute;
        z-index: 10;
        background: rgba(0, 0, 0, 0.92);
        border: 1px solid #00ff41;
        padding: 2px;
        font-family: "Courier New", monospace;
      }
      .pet-menu[hidden] {
        display: none;
      }
      .pet-menu-item {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin: 0;
        padding: 4px 12px;
        background: transparent;
        border: none;
        color: #00ff41;
        font: inherit;
        font-size: 13px;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;
        cursor: pointer;
      }
      .pet-menu-item:hover {
        background: rgba(0, 255, 65, 0.2);
      }
      /* 리사이즈 그립 — 투명 창에서 유일하게 늘 보이는 손잡이(우하단 초록 삼각형).
         평소 옅게, hover 시 진하게. 드래그로 창 크기 조절(JS 가 min/max clamp). */
      .pet-resize {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        z-index: 20;
        cursor: nwse-resize;
        background: linear-gradient(135deg, transparent 50%, #00ff41 50%);
        opacity: 0.3;
      }
      .pet-resize:hover {
        opacity: 0.8;
      }
    </style>
    <script type="module" src="pet/pet-window.js" defer></script>
  </head>
  <body></body>
</html>
