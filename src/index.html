<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>retro-note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <!--
      레트로 팔레트 SVG 필터 — 채널당 6단계 양자화로 216색(웹 세이프 팔레트)에 사상한다.
      .msg-image-wrap[data-kind="image"] .msg-image 에서 filter: url(#retro-palette) 로 참조.
      hidden + width/height 0 + position: absolute 로 레이아웃에 영향 0.
    -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <filter id="retro-palette" color-interpolation-filters="sRGB">
        <feComponentTransfer>
          <feFuncR type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1" />
          <feFuncG type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1" />
          <feFuncB type="discrete" tableValues="0 0.2 0.4 0.6 0.8 1" />
        </feComponentTransfer>
      </filter>
    </svg>
    <main class="app-container" id="app">
      <div class="screen-wrap" id="computer-wrap">
        <img
          class="computer"
          src="assets/computer.png"
          alt="retro computer"
          draggable="false"
        />

        <!-- 뷰 마운트 노드: 화면 영역을 덮는 투명 레이어. 각 뷰가 여기에 렌더된다. -->
        <div class="screen" id="screen"></div>

        <div class="top-controls">
          <button class="btn home-btn" id="home-btn" title="Home" hidden>[≡]</button>
          <button class="btn settings-btn" id="settings-btn" title="Settings" hidden>[*]</button>
          <button class="btn minimize-btn" id="minimize-btn" title="Minimize">[_]</button>
          <button class="btn close-btn" id="close-btn" title="Close">[X]</button>
        </div>
        <!-- 좌상단 화면 모드 토글(상시 크롬) -->
        <button class="btn screen-mode-btn" id="screen-mode-btn" title="Bezel screen">[⛶]</button>
        <button
          class="btn resize-grip"
          id="resize-grip"
          title="Drag to resize"
          aria-label="Resize"
        >◢</button>
      </div>
    </main>
  </body>
</html>
